appname = casvisor
httpport = 19000
runmode = dev
SessionOn = true
copyrequestbody = true

# Database — MySQL shared container (same MySQL, different DB)
driverName = mysql
dataSourceName = root:casdoor_mysql_password@tcp(casdoor-mysql:3306)/
dbName = casvisor
tableNamePrefix =

# Features
isDemoMode = false
logPostOnly = true

# Redis (optional)
redisEndpoint =

# Guacamole — for RDP/VNC/SSH remote desktop
# If guacd container is not running, remote desktop features won't work
guacamoleEndpoint = guacd:4822

# ===== Casdoor Integration =====
# These values MUST be updated after creating an application in Casdoor Admin Console
# See docs/casvisor-setup.md for instructions

# Internal URL (container-to-container)
casdoorEndpoint = http://casdoor:8000
# Public URL (browser redirect)
casdoorOrigin = https://logto-demo-casdoor.minproxy.io

clientId = <FILL_AFTER_CASDOOR_SETUP>
clientSecret = <FILL_AFTER_CASDOOR_SETUP>
casdoorOrganization = built-in
casdoorApplication = app-casvisor
