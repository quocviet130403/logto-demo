appname = casdoor
httpport = 8000
runmode = dev
copyrequestbody = true

# Database — MySQL shared container
driverName = mysql
dataSourceName = root:casdoor_mysql_password@tcp(casdoor-mysql:3306)/
dbName = casdoor
tableNamePrefix =
showSql = false

# Redis (optional, leave empty to disable)
redisEndpoint =

# Storage
defaultStorageProvider =
isCloudIntranet = false

# Auth
authState = "casdoor"
socks5Proxy =
verificationCodeTimeout = 10
initScore = 0
logPostOnly = true
isUsernameLowered = false

# URLs — set via environment or override here
origin =
originFrontend =
staticBaseUrl = "https://cdn.casbin.org"

# Features
isDemoMode = false
batchSize = 100
showGithubCorner = false
forceLanguage = ""
defaultLanguage = "en"
defaultApplication = "app-built-in"
enableErrorMask = false
enableGzip = true
inactiveTimeoutMinutes =

# LDAP/RADIUS (optional)
ldapServerPort = 389
ldapsServerPort = 636
radiusServerPort = 1812
radiusDefaultOrganization = "built-in"
radiusSecret = "secret"

# Quota (-1 = unlimited)
quota = {"organization": -1, "user": -1, "application": -1, "provider": -1}

# Logging
logConfig = {"adapter":"file", "filename": "logs/casdoor.log", "maxdays":99999, "perm":"0770"}

# Init data
initDataNewOnly = false
initDataFile = "./init_data.json"
