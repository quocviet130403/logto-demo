services:
  postgres:
    image: postgres:17-alpine
    container_name: logto-postgres
    environment:
      POSTGRES_USER: logto
      POSTGRES_PASSWORD: logto_password
      POSTGRES_DB: logto
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logto"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - logto-network

  logto:
    image: svhd/logto:latest
    container_name: logto-server
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm run cli db alteration deploy && npm start"]
    environment:
      TRUST_PROXY_HEADER: "1"
      DB_URL: postgresql://logto:logto_password@postgres:5432/logto
      ENDPOINT: http://103.232.122.149:3001
      ADMIN_ENDPOINT: http://103.232.122.149:3002
    ports:
      - "3001:3001"
      - "3002:3002"
    networks:
      - logto-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: logto-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - logto-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logto-backend
    depends_on:
      - logto
    environment:
      LOGTO_ENDPOINT: http://logto:3001
      LOGTO_API_RESOURCE: http://103.232.122.149:4000/api
      FRONTEND_URL: http://103.232.122.149:3000
      PORT: 4000
    ports:
      - "4000:4000"
    networks:
      - logto-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logto-frontend
    depends_on:
      - logto
      - backend
    environment:
      LOGTO_ENDPOINT: http://103.232.122.149:3001
      LOGTO_APP_ID: ${LOGTO_APP_ID:-your-app-id}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET:-your-app-secret}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET:-complex_password_at_least_32_characters_long_change_me}
      LOGTO_API_RESOURCE: http://103.232.122.149:4000/api
      NEXT_PUBLIC_BASE_URL: http://103.232.122.149:3000
    ports:
      - "3000:3000"
    networks:
      - logto-network

volumes:
  pgdata:

networks:
  logto-network:
    driver: bridge
