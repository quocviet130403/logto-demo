services:
  postgres:
    image: postgres:17-alpine
    container_name: logto-postgres
    environment:
      POSTGRES_USER: logto
      POSTGRES_PASSWORD: logto_password
      POSTGRES_DB: logto
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logto"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - logto-network

  logto:
    image: svhd/logto:latest
    container_name: logto-server
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe && npm run cli db alteration deploy && npm start"]
    environment:
      TRUST_PROXY_HEADER: "1"
      DB_URL: postgresql://logto:logto_password@postgres:5432/logto
      ENDPOINT: https://${DOMAIN_AUTH}
      ADMIN_ENDPOINT: https://${DOMAIN_ADMIN}
    expose:
      - "3001"
      - "3002"
    networks:
      - logto-network

  mailpit:
    image: axllent/mailpit:latest
    container_name: logto-mailpit
    expose:
      - "8025"
    ports:
      - "1025:1025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - logto-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: logto-backend
    depends_on:
      - logto
    environment:
      LOGTO_ENDPOINT: http://logto:3001
      LOGTO_API_RESOURCE: https://${DOMAIN}/api
      FRONTEND_URL: https://${DOMAIN}
      PORT: 4000
    expose:
      - "4000"
    networks:
      - logto-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: logto-frontend
    depends_on:
      - logto
      - backend
    environment:
      LOGTO_ENDPOINT: https://${DOMAIN_AUTH}
      LOGTO_APP_ID: ${LOGTO_APP_ID:-your-app-id}
      LOGTO_APP_SECRET: ${LOGTO_APP_SECRET:-your-app-secret}
      LOGTO_COOKIE_SECRET: ${LOGTO_COOKIE_SECRET:-complex_password_at_least_32_characters_long_change_me}
      LOGTO_API_RESOURCE: https://${DOMAIN}/api
      NEXT_PUBLIC_BASE_URL: https://${DOMAIN}
      LOGTO_ADMIN_URL: https://${DOMAIN_ADMIN}
      MAILPIT_WEB_UI: https://${DOMAIN_MAIL}
    expose:
      - "3000"
    networks:
      - logto-network

  # ===== Nginx Reverse Proxy =====
  nginx:
    image: nginx:alpine
    container_name: logto-nginx
    depends_on:
      - frontend
      - backend
      - logto
      - mailpit
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl-common.conf:/etc/nginx/ssl-common.conf:ro
      - ./nginx/conf.d/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./nginx/docker-entrypoint.sh:/custom-entrypoint.sh:ro
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot:ro
    environment:
      DOMAIN: ${DOMAIN}
      DOMAIN_AUTH: ${DOMAIN_AUTH}
      DOMAIN_ADMIN: ${DOMAIN_ADMIN}
      DOMAIN_MAIL: ${DOMAIN_MAIL}
    entrypoint: /custom-entrypoint.sh
    command: ["nginx", "-g", "daemon off;"]
    restart: unless-stopped
    networks:
      - logto-network

  # ===== Certbot (Let's Encrypt SSL) =====
  certbot:
    image: certbot/certbot
    container_name: logto-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - logto-network

volumes:
  pgdata:

networks:
  logto-network:
    driver: bridge
